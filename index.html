<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Check-List Buffet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;background:#f5f5f5;color:#1a1a1a}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
.topbar{background:#fff;padding:16px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.topbar-icon{width:44px;height:44px;border-radius:50%;background:#fce4ec;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:600;color:#1a1a1a}
.topbar-sub{font-size:13px;color:#888;margin-top:1px}
.prog-wrap{height:4px;background:#eee;position:sticky;top:77px;z-index:99}
.prog-bar{height:4px;background:#e91e8c;transition:width .35s ease;border-radius:0 3px 3px 0}
.page-wrap{flex:1;padding:28px 20px 120px}
.step-label{font-size:12px;font-weight:700;color:#e91e8c;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.step-q{font-size:22px;font-weight:700;color:#1a1a1a;line-height:1.35;margin-bottom:8px}
.step-hint{font-size:15px;color:#777;line-height:1.6;margin-bottom:24px}
input[type=text],input[type=date],input[type=time],input[type=number],textarea,select{width:100%;padding:16px 18px;border:1.5px solid #ddd;border-radius:14px;font-size:17px;background:#fff;color:#1a1a1a;font-family:inherit;-webkit-appearance:none;appearance:none;margin-bottom:4px}
input:focus,textarea:focus,select:focus{outline:none;border-color:#e91e8c}
.field{margin-bottom:18px}
.field label{font-size:14px;font-weight:600;color:#555;display:block;margin-bottom:8px}
.big-input{font-size:36px;font-weight:700;border:none;border-bottom:2.5px solid #ddd;border-radius:0;padding:8px 0;background:transparent}
.big-input:focus{border-color:#e91e8c;outline:none}
.opt-list{display:flex;flex-direction:column;gap:12px}
.opt-btn{width:100%;padding:18px 20px;border:1.5px solid #ddd;border-radius:16px;background:#fff;color:#1a1a1a;font-size:17px;font-family:inherit;text-align:left;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;line-height:1.4}
.opt-btn.sel{background:#fce4ec;border-color:#e91e8c;color:#880e4f}
.opt-check{width:26px;height:26px;border-radius:50%;border:2px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.opt-btn.sel .opt-check{background:#e91e8c;border-color:#e91e8c;color:#fff}
.yn-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.yn-btn{padding:20px 16px;border:1.5px solid #ddd;border-radius:16px;background:#fff;font-size:18px;font-weight:600;font-family:inherit;text-align:center;cursor:pointer;transition:all .15s}
.yn-btn.sim{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20}
.yn-btn.nao{background:#ffebee;border-color:#c62828;color:#7f0000}
.info-box{background:#f5f5f5;border-radius:14px;padding:16px 18px;font-size:14px;color:#555;line-height:1.7;margin-top:16px}
.warn-box{background:#fff3e0;border:1px solid #f57c00;border-radius:14px;padding:16px 18px;font-size:14px;color:#4e2700;line-height:1.7;margin-top:16px}
.conv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
.conv-card{background:#fff;border:1.5px solid #ddd;border-radius:14px;padding:16px}
.conv-card label{font-size:13px;font-weight:600;color:#888;display:block;margin-bottom:8px}
.conv-card input{border:none;padding:0;font-size:28px;font-weight:700;width:100%;background:transparent;color:#1a1a1a}
.conv-card input:focus{outline:none}
.sub-section{margin-top:20px;padding-top:20px;border-top:1px solid #eee}
.sub-title{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:14px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:16px 20px calc(16px + env(safe-area-inset-bottom));display:flex;gap:12px;z-index:100}
.btn-next{flex:1;padding:18px;background:#e91e8c;color:#fff;border:none;border-radius:16px;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-next:active{background:#ad1457}
.btn-back{padding:18px 22px;background:#f0f0f0;color:#1a1a1a;border:none;border-radius:16px;font-size:18px;font-weight:600;font-family:inherit;cursor:pointer}
.sum-section{font-size:12px;font-weight:700;color:#e91e8c;text-transform:uppercase;letter-spacing:1px;margin:20px 0 8px}
.sum-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid #f0f0f0;gap:16px}
.sum-label{font-size:15px;color:#888;flex-shrink:0;max-width:45%}
.sum-val{font-size:15px;font-weight:600;color:#1a1a1a;text-align:right;word-break:break-word}
.final-btn{width:100%;padding:20px;background:#e91e8c;color:#fff;border:none;border-radius:16px;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:12px}
.final-btn:active{background:#ad1457}
.ghost-btn{width:100%;padding:18px;background:#f0f0f0;color:#1a1a1a;border:none;border-radius:16px;font-size:17px;font-weight:600;font-family:inherit;cursor:pointer}
.ghost-btn:active{background:#e0e0e0}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric-card{background:#fff;border-radius:14px;border:1px solid #eee;padding:16px;text-align:center}
.metric-num{font-size:32px;font-weight:700;color:#1a1a1a}
.metric-label{font-size:13px;color:#888;margin-top:4px}
.admin-tab{padding:10px 16px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.admin-tab.active{background:#fce4ec;border-color:#e91e8c;color:#880e4f}
table{width:100%;border-collapse:collapse}
th{padding:12px 14px;text-align:left;font-size:13px;font-weight:600;color:#888;background:#f9f9f9;border-bottom:1px solid #eee}
td{padding:12px 14px;font-size:15px;border-bottom:1px solid #f0f0f0;vertical-align:top}
.tbl-wrap{background:#fff;border-radius:14px;border:1px solid #eee;overflow:hidden;margin-bottom:14px}
.tbl-head{padding:14px 16px;font-size:15px;font-weight:700;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.cl-card{background:#fff;border-radius:16px;border:1px solid #eee;padding:18px 20px;margin-bottom:12px;cursor:pointer}
.cl-card:active{background:#f9f9f9}
.cl-name{font-size:17px;font-weight:700;color:#1a1a1a}
.cl-sub{font-size:14px;color:#888;margin-top:3px}
.cl-link{font-size:14px;color:#e91e8c;font-weight:600;margin-top:10px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;background:#fce4ec;color:#880e4f;margin-left:8px}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px calc(32px + env(safe-area-inset-bottom));width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:20px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#888;padding:4px}
/* Admin fields */
.admin-section{background:#fce4ec;border:1.5px solid #e91e8c;border-radius:16px;padding:18px;margin-bottom:20px}
.admin-section-title{font-size:13px;font-weight:700;color:#ad1457;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
/* WhatsApp copy box */
.wa-box{background:#e8f5e9;border:1px solid #2e7d32;border-radius:14px;padding:16px;margin-top:14px;font-size:14px;font-family:monospace;white-space:pre-wrap;word-break:break-word;color:#1b5e20;display:none}
.copy-btn{padding:14px 20px;background:#25d366;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;margin-top:10px}
.copy-btn:active{background:#1da851}
.qty-input{width:70px;padding:8px;border-radius:8px;border:1px solid #ddd;font-size:15px;text-align:center;font-family:inherit}
/* Print / PDF */
@media print{
  .screen{display:none!important}
  #print-area{display:block!important}
  body{background:#fff}
}
#print-area{display:none}
</style>
</head>
<body>

<!-- FORM SCREEN -->
<div id="s-form" class="screen active">
  <div class="topbar">
    <div class="topbar-icon">🎉</div>
    <div>
      <div class="topbar-title">Check-List da Festa</div>
      <div class="topbar-sub" id="step-lbl">Etapa 1 de 24</div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:4%"></div></div>
  <div id="page-body" class="page-wrap"></div>
  <div class="bottom-nav">
    <button class="btn-back" id="btn-back" onclick="prev()" style="display:none">←</button>
    <button class="btn-next" id="btn-next" onclick="next()">Próximo →</button>
  </div>
</div>

<!-- REVIEW SCREEN -->
<div id="s-review" class="screen">
  <div class="topbar">
    <div class="topbar-icon">📋</div>
    <div>
      <div class="topbar-title">Revisar check-list</div>
      <div class="topbar-sub">Confira antes de enviar</div>
    </div>
  </div>
  <div style="padding:20px 20px 180px" id="review-body"></div>
  <div class="bottom-nav" style="flex-direction:column;gap:10px">
    <button class="final-btn" onclick="saveAndSend()">✓ Salvar e enviar no WhatsApp</button>
    <button class="ghost-btn" onclick="backForm()">← Voltar e editar</button>
  </div>
</div>

<!-- DONE SCREEN -->
<div id="s-done" class="screen" style="justify-content:center;align-items:center;padding:32px 24px;text-align:center;background:#fff">
  <div style="font-size:80px;margin-bottom:20px">🎊</div>
  <div style="font-size:24px;font-weight:700;margin-bottom:10px">Enviado com sucesso!</div>
  <div style="font-size:16px;color:#777;line-height:1.6;margin-bottom:28px">Seu check-list foi salvo. O WhatsApp do buffet foi notificado automaticamente.</div>
  <div id="done-box" style="background:#f5f5f5;border-radius:14px;padding:16px 20px;width:100%;font-size:15px;color:#555;line-height:1.8;margin-bottom:24px;text-align:left"></div>
  <button class="final-btn" onclick="startNew()">Preencher novo check-list</button>
</div>

<!-- ADMIN SCREEN -->
<div id="s-admin" class="screen">
  <div class="topbar">
    <div class="topbar-icon">📊</div>
    <div>
      <div class="topbar-title">Painel Admin</div>
      <div class="topbar-sub">Relatórios & Check-lists</div>
    </div>
  </div>
  <div style="padding:16px 20px 100px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div><label style="font-size:13px;font-weight:600;color:#888;display:block;margin-bottom:6px">De</label><input type="date" id="fs" onchange="renderAdmin()"></div>
      <div><label style="font-size:13px;font-weight:600;color:#888;display:block;margin-bottom:6px">Até</label><input type="date" id="fe" onchange="renderAdmin()"></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px" id="atabs"></div>
    <div id="abody"></div>
  </div>
</div>

<!-- VIEW CHECKLIST MODAL -->
<div class="modal-overlay" id="modal-view">
  <div class="modal-box">
    <div class="modal-title">
      <span id="modal-title-text">Check-List</span>
      <button class="modal-close" onclick="closeModal('modal-view')">✕</button>
    </div>
    <div id="modal-cl-body"></div>
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
      <button class="final-btn" style="margin-bottom:0" onclick="printCL()">🖨️ Gerar PDF / Imprimir</button>
      <button class="ghost-btn" onclick="closeModal('modal-view')">Fechar</button>
    </div>
  </div>
</div>

<!-- ADMIN COMPLETE FIELDS MODAL (para admin completar após receber) -->
<div class="modal-overlay" id="modal-admin-edit">
  <div class="modal-box">
    <div class="modal-title">
      <span>✏️ Completar Check-List</span>
      <button class="modal-close" onclick="closeModal('modal-admin-edit')">✕</button>
    </div>
    <div id="modal-admin-edit-body"></div>
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
      <button class="final-btn" style="margin-bottom:0" onclick="saveAdminFields()">💾 Salvar</button>
      <button class="ghost-btn" onclick="closeModal('modal-admin-edit')">Cancelar</button>
    </div>
  </div>
</div>

<!-- PRINT AREA -->
<div id="print-area"></div>

<script>
const WA='5519987177588';
// ---- JSONBin config ----
const JBIN_KEY='$2a$10$tiG6vJcnp2OFIzHaM480eu.XU59MCbpU7sYxTmCSJ0rsMBCsDhTrS';
const JBIN_ID='69ddb3d2856a6821892f7cc4';

async function jbinSave(data){
  await fetch('https://api.jsonbin.io/v3/b/'+JBIN_ID,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':JBIN_KEY},
    body:JSON.stringify({checklists:data})
  });
}

async function jbinLoad(){
  try{
    const r=await fetch('https://api.jsonbin.io/v3/b/'+JBIN_ID+'/latest',{
      headers:{'X-Master-Key':JBIN_KEY}
    });
    const j=await r.json();
    return j.record?.checklists||[];
  }catch(e){return[];}
}
let fd={}, cur=0, atab=0, editingId=null;

const CORES=['BRANCO','PRETO','AZUL ROYAL','AZUL MARINHO','AZUL BEBÊ','ROSA BEBÊ','AMARELO CANDY','PINK','AMARELO','VERMELHO','LARANJA','CORES NEON','LILÁS','VERDE ESCURO','VERDE CLARO','MARROM'];
const CARDAPIOS=['Cardápio Diversão','Cardápio Premium','Cardápio Diamante','Cardápio Master','Cardápio Top'];
const BOLOS=['Brigadeiro tradicional','Brigadeiro 2','Chocolate com maracujá','Chocolate branco'];
const DOCES=['Beijinho','Brigadeiro ★','Bicho de pé','Brigadeiro branco ninho ★'];
const ESTILOS=['Infantis','Sertanejo','Pagode','Pop','Internacional','MPB','Rock','Evangélica'];
const ATABS=['📋 Check-lists','🎀 Toalhas','👥 Convidados','🎂 Cardápio','🍬 Doces','🎵 Música'];

const pages=[
{id:'nome',lbl:'Responsáveis',q:'Nome dos responsáveis',
 r:()=>`<input type="text" id="v" placeholder="Nome completo" value="${fd.nome||''}">`},
{id:'aniv',lbl:'Aniversariante',q:'Nome do aniversariante',
 r:()=>`<input type="text" id="v" placeholder="Nome da criança" value="${fd.aniv||''}">`},
{id:'idade',lbl:'Idade',q:'Qual idade irá completar?',
 r:()=>`<input type="number" class="big-input" id="v" placeholder="5" min="1" max="18" value="${fd.idade||''}" inputmode="numeric">`},
{id:'data',lbl:'Data da festa',q:'Qual a data da festa?',
 r:()=>`<div class="field"><label>Data</label><input type="date" id="v" value="${fd.data||''}"></div><div class="field"><label>Horário de início</label><input type="time" id="v2" value="${fd.horario||''}"></div>`},
{id:'tema',lbl:'Tema',q:'Qual o tema da festa?',
 r:()=>`<input type="text" id="v" placeholder="Ex: Frozen, Homem-Aranha..." value="${fd.tema||''}">`},
{id:'cardapio',lbl:'Cardápio',q:'Qual o cardápio contratado?',
 r:()=>`<div class="opt-list">${CARDAPIOS.map(c=>`<button class="opt-btn ${fd.cardapio===c?'sel':''}" onclick="pick1('cardapio','${c}',this)"><span class="opt-check">${fd.cardapio===c?'✓':''}</span>${c}</button>`).join('')}</div>`},
{id:'pagantes',lbl:'Pagantes',q:'Quantos pagantes contratados?',
 r:()=>`<input type="number" class="big-input" id="v" placeholder="80" min="0" value="${fd.pagantes||''}" inputmode="numeric">`},
{id:'convidados',lbl:'Convidados',q:'Quantidade de convidados confirmados',hint:'Informe por faixa etária.',
 r:()=>`<div class="conv-grid">
  <div class="conv-card"><label>0 a 4 anos</label><input type="number" id="c04" min="0" value="${fd.c04||0}" inputmode="numeric" oninput="chkConv()"></div>
  <div class="conv-card"><label>5 a 9 anos</label><input type="number" id="c59" min="0" value="${fd.c59||0}" inputmode="numeric" oninput="chkConv()"></div>
  <div class="conv-card"><label>10 a 12 anos</label><input type="number" id="c1012" min="0" value="${fd.c1012||0}" inputmode="numeric" oninput="chkConv()"></div>
  <div class="conv-card"><label>Adultos</label><input type="number" id="cad" min="0" value="${fd.adultos||0}" inputmode="numeric" oninput="chkConv()"></div>
 </div>
 <div id="conv-warn" style="display:none" class="warn-box"></div>
 <div class="info-box">Caso a quantidade de confirmados seja igual ou maior que 10% do que está contratado, automaticamente é necessário adicionar pagantes. No dia do evento, se passar de 10% é cobrado os adicionais mais uma multa de 20% sobre o valor do adicional.</div>`},
{id:'cores',lbl:'Toalhas',q:'Cor das toalhas das mesas',hint:'Escolha até 3 cores.',
 r:()=>`<div class="opt-list">${CORES.map(c=>`<button class="opt-btn ${(fd.cores||[]).includes(c)?'sel':''}" onclick="pickM('cores',3,'${c}',this)"><span class="opt-check">${(fd.cores||[]).includes(c)?'✓':''}</span>${c}</button>`).join('')}</div>`},
{id:'centro',lbl:'Centro de mesa',q:'Terá centro de mesa?',
 r:()=>`<div class="yn-row"><button class="yn-btn ${fd.centro==='Sim'?'sim':''}" onclick="pickYN('centro','Sim',this)">✓ &nbsp;Sim</button><button class="yn-btn ${fd.centro==='Não'?'nao':''}" onclick="pickYN('centro','Não',this)">✗ &nbsp;Não</button></div>`},
{id:'souvenir',lbl:'Lembrancinha',q:'Lembrancinha do buffet',hint:'A bola com o logo do buffet é distribuída para todas as crianças até 12 anos. A bola não tem custo.',
 r:()=>`<div class="opt-list">
  <button class="opt-btn ${fd.souvenir==='Somente a bola'?'sel':''}" onclick="pick1('souvenir','Somente a bola',this)"><span class="opt-check">${fd.souvenir==='Somente a bola'?'✓':''}</span>Quero somente a bola</button>
  <button class="opt-btn ${fd.souvenir==='Bola + copo'?'sel':''}" onclick="pick1('souvenir','Bola + copo',this)"><span class="opt-check">${fd.souvenir==='Bola + copo'?'✓':''}</span><span>Quero a bola + copo long drink<span style="display:block;font-size:13px;color:#888;margin-top:2px">R$ 5,90 por unidade</span></span></button>
 </div>`},
{id:'lembranca',lbl:'Lembrancinha extra',q:'Terá lembrancinha a parte?',
 r:()=>`<div class="opt-list" style="margin-bottom:20px">
  <button class="opt-btn ${fd.lembranca==='Não'?'sel':''}" onclick="pick1('lembranca','Não',this);document.getElementById('lemb-obs-wrap').style.display='none'"><span class="opt-check">${fd.lembranca==='Não'?'✓':''}</span>Não</button>
  <button class="opt-btn ${fd.lembranca==='Sim, vou levar lembrancinhas à parte'?'sel':''}" onclick="pick1('lembranca','Sim, vou levar lembrancinhas à parte',this);document.getElementById('lemb-obs-wrap').style.display='block'"><span class="opt-check">${fd.lembranca==='Sim, vou levar lembrancinhas à parte'?'✓':''}</span>Sim, vou levar lembrancinhas à parte</button>
 </div>
 <div id="lemb-obs-wrap" style="display:${fd.lembranca&&fd.lembranca!=='Não'?'block':'none'}">
  <div class="field"><label>Observações sobre a lembrancinha</label>
  <textarea id="v" rows="3" placeholder="Ex: caixinha personalizada, sacolinha..." style="resize:none">${fd.lembrancaObs||''}</textarea></div>
 </div>`},
{id:'bolo',lbl:'Bolo',q:'Qual o sabor do bolo?',
 r:()=>`<div class="opt-list">${BOLOS.map(b=>`<button class="opt-btn ${fd.bolo===b?'sel':''}" onclick="pick1('bolo','${b}',this)"><span class="opt-check">${fd.bolo===b?'✓':''}</span>${b}</button>`).join('')}</div>`},
{id:'doces',lbl:'Docinhos',q:'Quais os docinhos?',hint:'Escolha exatamente 2.',
 r:()=>`<div class="opt-list">${DOCES.map(d=>`<button class="opt-btn ${(fd.doces||[]).includes(d)?'sel':''}" onclick="pickM('doces',2,'${encodeURIComponent(d)}',this)"><span class="opt-check">${(fd.doces||[]).includes(d)?'✓':''}</span><span>${d.replace(' ★','')}<span style="font-size:12px;color:#2e7d32;display:${d.includes('★')?'inline':'none'}"> ★ recomendado</span></span></button>`).join('')}</div>`},
{id:'sem_pais',lbl:'Crianças s/ pais',q:'Vai ter crianças sem os pais?',
 r:()=>`<div class="yn-row"><button class="yn-btn ${fd.sem_pais==='Sim'?'sim':''}" onclick="pickYN('sem_pais','Sim',this)">✓ &nbsp;Sim</button><button class="yn-btn ${fd.sem_pais==='Não'?'nao':''}" onclick="pickYN('sem_pais','Não',this)">✗ &nbsp;Não</button></div>
 <div class="info-box">Crianças sem os pais ficam sob responsabilidade do buffet. Informar quantidade ao atendente.</div>`},

function render(){
  const p=pages[cur];
  document.getElementById('page-body').innerHTML=`
   <div class="step-label">${p.lbl}</div>
   <div class="step-q">${p.q}</div>
   ${p.hint?`<div class="step-hint">${p.hint}</div>`:''}
   ${p.r()}`;
  document.getElementById('step-lbl').textContent='Etapa '+(cur+1)+' de '+pages.length;
  document.getElementById('prog').style.width=(((cur+1)/pages.length)*100)+'%';
  document.getElementById('btn-back').style.display=cur>0?'':'none';
  document.getElementById('btn-next').textContent=cur===pages.length-1?'Revisar ✓':'Próximo →';
  if(p.id==='convidados')setTimeout(chkConv,80);
}

function collect(){
  const p=pages[cur],g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  if(p.id==='nome')fd.nome=g('v');
  else if(p.id==='aniv')fd.aniv=g('v');
  else if(p.id==='idade')fd.idade=g('v');
  else if(p.id==='data'){fd.data=g('v');fd.horario=g('v2');}
  else if(p.id==='tema')fd.tema=g('v');
  else if(p.id==='pagantes')fd.pagantes=g('v');
  else if(p.id==='convidados'){fd.c04=g('c04');fd.c59=g('c59');fd.c1012=g('c1012');fd.adultos=g('cad');}
  else if(p.id==='lembranca'){fd.lembranca=fd.lembranca||g('v');fd.lembrancaObs=g('v');}
  else if(p.id==='msim')fd.msim=g('v');
  else if(p.id==='mnao')fd.mnao=g('v');
  else if(p.id==='obs')fd.obs=g('v');
}

function next(){collect();if(cur<pages.length-1){cur++;render();window.scrollTo(0,0);}else showReview();}
function prev(){collect();if(cur>0){cur--;render();window.scrollTo(0,0);}}
function backForm(){show('s-form');render();}

function pick1(k,v,btn){
  fd[k]=v;
  btn.closest('.opt-list')?.querySelectorAll('.opt-btn').forEach(b=>{b.classList.remove('sel');b.querySelector('.opt-check').textContent='';});
  btn.classList.add('sel');btn.querySelector('.opt-check').textContent='✓';
}
function pickYN(k,v,btn){
  fd[k]=v;
  btn.closest('.yn-row').querySelectorAll('.yn-btn').forEach(b=>b.className='yn-btn');
  btn.classList.add(v==='Sim'?'sim':'nao');
}
function pickM(k,max,v,btn){
  v=decodeURIComponent(v);
  if(!fd[k])fd[k]=[];
  if(fd[k].includes(v)){fd[k]=fd[k].filter(x=>x!==v);btn.classList.remove('sel');btn.querySelector('.opt-check').textContent='';}
  else if(fd[k].length<max){fd[k].push(v);btn.classList.add('sel');btn.querySelector('.opt-check').textContent='✓';}
}
function scerv(){setTimeout(()=>{const s=document.getElementById('cerv-sub');if(s)s.style.display=fd.cerveja==='Sim'?'block':'none';},50);}
function chkConv(){
  const c04=parseInt(document.getElementById('c04')?.value||0);
  const c59=parseInt(document.getElementById('c59')?.value||0);
  const c1012=parseInt(document.getElementById('c1012')?.value||0);
  const cad=parseInt(document.getElementById('cad')?.value||0);
  const tTotal=c04+c59+c1012+cad;
  const pag59=Math.ceil(c59/2);
  const pagEfetivos=pag59+c1012+cad;
  const p=parseInt(fd.pagantes||0);
  const w=document.getElementById('conv-warn');
  if(!w)return;
  let msgs=[];
  if(p>0&&tTotal>p*1.1){msgs.push('⚠️ Total de '+tTotal+' convidados está acima de 10% do contratado ('+p+'). Adicionais necessários!');}
  if(tTotal>50){msgs.push('📊 Cálculo de pagantes efetivos:\n• 0–4 anos: '+c04+' crianças → não contam\n• 5–9 anos: '+c59+' crianças → '+pag59+' pagante(s) (cada 2 = 1)\n• 10–12 anos: '+c1012+' → '+c1012+' pagante(s)\n• Adultos: '+cad+' → '+cad+' pagante(s)\n\nTotal pagantes efetivos: '+pagEfetivos+(p>0?'\nContratado: '+p+(pagEfetivos>p?' ⚠️ Necessário adicionar '+(pagEfetivos-p)+' pagante(s)!':' ✓ Ok'):''));}
  if(msgs.length>0){w.style.display='block';w.innerHTML=msgs.map(m=>m.replace(/\n/g,'<br>')).join('<br><br>');}
  else{w.style.display='none';}
}

function showReview(){
  show('s-review');
  const tot=parseInt(fd.c04||0)+parseInt(fd.c59||0)+parseInt(fd.c1012||0)+parseInt(fd.adultos||0);
  const p=parseInt(fd.pagantes||0);
  const warn=tot>p*1.1&&p>0?`<div class="warn-box" style="margin-bottom:16px">⚠️ ${tot} convidados acima de 10% do contratado (${p}). Adicionais necessários!</div>`:'';
  const sec=(t,rows)=>`<div class="sum-section">${t}</div>${rows.map(([l,v])=>`<div class="sum-row"><span class="sum-label">${l}</span><span class="sum-val">${v||'—'}</span></div>`).join('')}`;
  document.getElementById('review-body').innerHTML=warn+
    sec('Evento',[['Responsáveis',fd.nome],['Aniversariante',fd.aniv],['Idade que irá completar',fd.idade+' anos'],['Data',fd.data],['Horário',fd.horario],['Tema',fd.tema],['Cardápio',fd.cardapio],['Pagantes',fd.pagantes]])+
    sec('Convidados',[['0–4 anos',fd.c04||0],['5–9 anos',fd.c59||0],['10–12 anos',fd.c1012||0],['Adultos',fd.adultos||0],['Total',tot]])+
    sec('Decoração',[['Cores das toalhas',(fd.cores||[]).join(', ')],['Centro de mesa',fd.centro],['Souvenir',fd.souvenir],['Lembrancinha extra',fd.lembranca+(fd.lembrancaObs?' — '+fd.lembrancaObs:'')],['Arco de balão',fd.arco]])+
    sec('Cardápio',[['Bolo',fd.bolo],['Docinhos',(fd.doces||[]).map(d=>d.replace(' ★','')).join(' + ')]])+
    sec('Serviços',[['Crianças s/ pais',fd.sem_pais],['1 cça + 1 acomp.',fd.acomp],['Cerveja',fd.cerveja+(fd.ctipo?' ('+fd.ctipo+')':'')],['Personagem vivo',fd.personagem],['Fotógrafo',fd.fotografo]])+
    sec('Música',[['Estilos',(fd.estilos||[]).join(', ')],['Não pode faltar',fd.msim],['Não pode tocar',fd.mnao]])+
    sec('Obs',[['Observações',fd.obs]]);
}

async function saveAndSend(){
  const id='cl_'+Date.now();fd.id=id;fd.savedAt=new Date().toISOString();
  try{const all=await load();all.push(fd);await jbinSave(all);}catch(e){console.error(e);}
  const msg=encodeURIComponent('Olá! Preenchi o check-list da festa de '+(fd.aniv||'minha filha')+' ('+(fd.data||'')+').\n\nPor favor acesse o painel admin para ver os detalhes. ID: '+id);
  document.getElementById('done-box').innerHTML='<b>Aniversariante:</b> '+(fd.aniv||'—')+'<br><b>Data:</b> '+(fd.data||'—')+'<br><b>Horário:</b> '+(fd.horario||'—')+'<br><b>Tema:</b> '+(fd.tema||'—');
  show('s-done');
  setTimeout(()=>window.open('https://wa.me/'+WA+'?text='+msg,'_blank'),700);
}

function buildToalhasReport(fl){return fl.sort((a,b)=>a.data>b.data?1:-1);}

function gerarWAToalhas(fl){
  const s=document.getElementById('fs')?.value, e=document.getElementById('fe')?.value;
  const fil=fl.filter(c=>{if(s&&c.data&&c.data<s)return false;if(e&&c.data&&c.data>e)return false;return true;});
  const cc={};fil.forEach(c=>(c.cores||[]).forEach(x=>{cc[x]=(cc[x]||0)+1;}));
  let txt='🎀 *RELATÓRIO DE TOALHAS*\n';
  txt+='📅 Período: '+(s?fmtDate(s):'início')+' a '+(e?fmtDate(e):'hoje')+'\n\n';
  txt+='*POR EVENTO:*\n';
  fil.forEach(c=>{
    const tot=parseInt(c.c04||0)+parseInt(c.c59||0)+parseInt(c.c1012||0)+parseInt(c.adultos||0);
    txt+=`• ${fmtDate(c.data)} ${c.horario||''} — ${(c.cores||[]).join('+')||'—'}\n`;
    txt+=`  👶0-4:${c.c04||0} 🧒5-9:${c.c59||0} 👦10-12:${c.c1012||0} 🧑Ad:${c.adultos||0} (Total:${tot})\n`;
  });
  txt+='\n*RESUMO CORES:*\n';
  Object.entries(cc).sort((a,b)=>b[1]-a[1]).forEach(([k,n])=>{
    const elId='qty_'+k.replace(/ /g,'_');
    const qtd=document.getElementById(elId)?.value||'';
    txt+=`• ${k}: ${n} festa(s)${qtd?' — Qtd: '+qtd:''}  \n`;
  });
  document.getElementById('wa-toalhas').textContent=txt;
  document.getElementById('wa-toalhas').style.display='block';
  navigator.clipboard.writeText(txt).then(()=>alert('✅ Copiado! Cole no WhatsApp.')).catch(()=>{});
}

function gerarWABolos(fl){
  const s=document.getElementById('fs')?.value, e=document.getElementById('fe')?.value;
  const fil=fl.filter(c=>{if(s&&c.data&&c.data<s)return false;if(e&&c.data&&c.data>e)return false;return true;});
  const bc={};fil.forEach(c=>{if(c.bolo)bc[c.bolo]=(bc[c.bolo]||0)+1;});
  let txt='🎂 *RELATÓRIO DE BOLOS*\n';
  txt+='📅 Período: '+(s?fmtDate(s):'início')+' a '+(e?fmtDate(e):'hoje')+'\n\n';
  txt+='*POR EVENTO:*\n';
  fil.sort((a,b)=>a.data>b.data?1:-1).forEach(c=>{
    const tot=parseInt(c.c04||0)+parseInt(c.c59||0)+parseInt(c.c1012||0)+parseInt(c.adultos||0);
    txt+=`• ${fmtDate(c.data)} ${c.horario||''} — ${c.bolo||'—'}\n`;
    txt+=`  👶0-4:${c.c04||0} 🧒5-9:${c.c59||0} 👦10-12:${c.c1012||0} 🧑Ad:${c.adultos||0} (Total:${tot})\n`;
  });
  txt+='\n*RESUMO SABORES:*\n';
  Object.entries(bc).sort((a,b)=>b[1]-a[1]).forEach(([k,n])=>{
    const elId='bqty_'+k.replace(/ /g,'_');
    const qtd=document.getElementById(elId)?.value||'';
    txt+=`• ${k.replace(' ★','')}: ${n} festa(s)${qtd?' — Qtd: '+qtd:''}  \n`;
  });
  document.getElementById('wa-bolos').textContent=txt;
  document.getElementById('wa-bolos').style.display='block';
  navigator.clipboard.writeText(txt).then(()=>alert('✅ Copiado! Cole no WhatsApp.')).catch(()=>{});
}

function mkTbl(title,obj){
  return`<div class="tbl-wrap" style="margin-bottom:14px"><div class="tbl-head"><span>${title}</span></div><table><thead><tr><th>Item</th><th style="text-align:right">Festas</th></tr></thead><tbody>${Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(([k,n])=>`<tr><td>${k.replace(' ★','')}</td><td style="text-align:right;font-weight:600">${n}</td></tr>`).join('')}</tbody></table></div>`;
}

function setATab(i){atab=i;renderAdmin();}

function fmtDate(d){
  if(!d)return'—';
  try{const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}catch(e){return d;}
}

// ---- VIEW CHECK-LIST MODAL ----
let currentViewCL=null;
async function viewCL(id){
  const all=await load();
  const c=all.find(x=>x.id===id);
  if(!c)return;
  currentViewCL=c;
  document.getElementById('modal-title-text').textContent=(c.aniv||'—')+' · '+fmtDate(c.data);
  document.getElementById('modal-cl-body').innerHTML=buildCLHtml(c);
  openModal('modal-view');
}

function buildCLHtml(c){
  const tot=parseInt(c.c04||0)+parseInt(c.c59||0)+parseInt(c.c1012||0)+parseInt(c.adultos||0);
  const sec=(t,rows)=>`<div class="sum-section">${t}</div>${rows.map(([l,v])=>`<div class="sum-row"><span class="sum-label">${l}</span><span class="sum-val">${v||'—'}</span></div>`).join('')}`;
  let html=sec('Evento',[
    ['Responsáveis',c.nome],['Aniversariante',c.aniv],['Idade',c.idade+' anos'],
    ['Data',fmtDate(c.data)],['Horário',c.horario],['Tema',c.tema],
    ['Cardápio',c.cardapio],['Pagantes',c.pagantes]
  ])+
  sec('Convidados',[
    ['0–4 anos',c.c04||0],['5–9 anos',c.c59||0],['10–12 anos',c.c1012||0],
    ['Adultos',c.adultos||0],['Total',tot]
  ])+
  sec('Decoração',[
    ['Cores das toalhas',(c.cores||[]).join(', ')],['Centro de mesa',c.centro],
    ['Souvenir',c.souvenir],['Lembrancinha',c.lembranca+(c.lembrancaObs?' — '+c.lembrancaObs:'')],
    ['Arco de balão',c.arco]
  ])+
  sec('Cardápio',[
    ['Bolo',c.bolo],['Docinhos',(c.doces||[]).map(d=>d.replace(' ★','')).join(' + ')]
  ])+
  sec('Serviços',[
    ['Crianças s/ pais',c.sem_pais],['1 cça + 1 acomp.',c.acomp],
    ['Cerveja',c.cerveja+(c.ctipo?' ('+c.ctipo+')':'')],
    ['Personagem vivo',c.personagem],['Fotógrafo',c.fotografo]
  ])+
  sec('Música',[
    ['Estilos',(c.estilos||[]).join(', ')],
    ['Não pode faltar',c.msim],['Não pode tocar',c.mnao]
  ])+
  sec('Observações cliente',[['Obs',c.obs]]);

  // Admin fields
  if(c.formatoFesta||c.valorAdicional||c.obsAdmin){
    html+=`<div style="margin-top:16px;background:#fce4ec;border-radius:14px;padding:16px">
      <div style="font-size:12px;font-weight:700;color:#ad1457;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">📌 Informações Admin</div>
      ${c.formatoFesta?`<div class="sum-row"><span class="sum-label">Formato festa (5-9)</span><span class="sum-val">${c.formatoFesta}</span></div>`:''}
      ${c.valorAdicional?`<div class="sum-row"><span class="sum-label">Valor adicional no dia</span><span class="sum-val">R$ ${c.valorAdicional}</span></div>`:''}
      ${c.obsAdmin?`<div class="sum-row"><span class="sum-label">Obs. combinadas</span><span class="sum-val">${c.obsAdmin}</span></div>`:''}
    </div>`;
  }
  return html;
}

async function editAdminFields(id){
  const all=await load();
  const c=all.find(x=>x.id===id);
  if(!c)return;
  editingId=id;
  document.getElementById('modal-admin-edit-body').innerHTML=`
    <div style="margin-bottom:8px;font-size:15px;font-weight:600;color:#888">${c.aniv||'—'} · ${fmtDate(c.data)} · ${c.horario||''}</div>

    <div class="field" style="margin-top:16px">
      <label>Formato da festa — crianças 5 a 9 anos</label>
      <div class="opt-list" style="margin-top:8px">
        <button class="opt-btn ${c.formatoFesta==='5 a 9 paga meia'?'sel':''}" onclick="selAdminFmt('5 a 9 paga meia',this)">
          <span class="opt-check">${c.formatoFesta==='5 a 9 paga meia'?'✓':''}</span>
          5 a 9 anos — <b>paga meia</b>
        </button>
        <button class="opt-btn ${c.formatoFesta==='5 anos inteira'?'sel':''}" onclick="selAdminFmt('5 anos inteira',this)">
          <span class="opt-check">${c.formatoFesta==='5 anos inteira'?'✓':''}</span>
          5 anos — <b>paga inteira</b>
        </button>
      </div>
    </div>

    <div class="field" style="margin-top:4px">
      <label>Valor do adicional no dia do evento</label>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:20px;font-weight:700;color:#888">R$</span>
        <input type="number" id="admin-adicional" placeholder="0,00" step="0.01" min="0" value="${c.valorAdicional||''}" style="flex:1">
      </div>
    </div>

    <div class="field">
      <label>Obs. combinadas</label>
      <textarea id="admin-obs" rows="5" placeholder="Ex: decoração a parte, horário do personagem, pintura facial..." style="resize:none">${c.obsAdmin||''}</textarea>
      <div style="font-size:12px;color:#888;margin-top:4px">Use para registrar detalhes combinados: decoração a parte, horário do personagem, pintura facial, etc.</div>

let _adminFmt='';
function selAdminFmt(v,btn){
  _adminFmt=v;
  btn.closest('.opt-list').querySelectorAll('.opt-btn').forEach(b=>{b.classList.remove('sel');b.querySelector('.opt-check').textContent='';});
  btn.classList.add('sel');btn.querySelector('.opt-check').textContent='✓';
}

async function saveAdminFields(){
  if(!editingId)return;
  const adicional=document.getElementById('admin-adicional')?.value||'';
  const obsAdmin=document.getElementById('admin-obs')?.value||'';
  const all=await load();
  const idx=all.findIndex(x=>x.id===editingId);
  if(idx===-1)return;
  if(_adminFmt)all[idx].formatoFesta=_adminFmt;
  if(adicional)all[idx].valorAdicional=adicional;
  all[idx].obsAdmin=obsAdmin;
  try{await jbinSave(all);}catch(e){console.error(e);}
  closeModal('modal-admin-edit');
  _adminFmt='';
  renderAdmin();
  alert('✅ Salvo com sucesso!');
}

window.addEventListener('DOMContentLoaded',()=>{
  const p=new URL(window.location.href).searchParams;
  if(p.get('admin')==='true'){
    const senha=prompt('🔒 Senha do painel admin:');
    if(senha==='349'){
      show('s-admin');
      const td=new Date(),m30=new Date(td-30*864e5);
      document.getElementById('fs').value=m30.toISOString().split('T')[0];
      document.getElementById('fe').value=td.toISOString().split('T')[0];
      renderAdmin();
    } else {
      alert('Senha incorreta.');
      show('s-form');render();
    }
  } else {
    show('s-form');render();
  }
});
